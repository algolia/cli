version: 3
output: prefixed
dotenv: [.env]
vars:
  # The URL to the current Algolia docs repo
  docs_remote: https://github.com/algolia/docs-new.git
  docs_local: docs
  cli_ref_path: doc/tools/cli/commands
  # The temporary folder for the generated MDX files
  docs_output_dir: tmp
tasks:
  build:
    desc: Build the algolia binary
    deps: [generate]
    cmd: >-
      go build -ldflags
      "-s -w
      -X github.com/algolia/cli/pkg/version.Version={{ .VERSION }}
      -X github.com/algolia/cli/api/dashboard.DefaultDashboardURL=$ALGOLIA_DASHBOARD_URL
      -X github.com/algolia/cli/api/dashboard.DefaultAPIURL=$ALGOLIA_API_URL
      -X github.com/algolia/cli/pkg/config.DefaultSearchHosts=$ALGOLIA_SEARCH_HOSTS
      -X github.com/algolia/cli/pkg/auth.DefaultOAuthClientID=$ALGOLIA_OAUTH_CLIENT_ID
      -X 'github.com/algolia/cli/api/dashboard.DefaultOAuthScope=$ALGOLIA_OAUTH_SCOPE'
      -X github.com/algolia/cli/api/agentstudio.DefaultBaseURL=$ALGOLIA_AGENT_STUDIO_URL
      -X github.com/algolia/cli/pkg/version.Distribution={{ .DIST }}"
      -o {{ .OUTPUT }} cmd/algolia/main.go
    vars:
      OUTPUT: '{{ .OUTPUT | default "algolia" }}'
      VERSION: '{{ .VERSION | default "main" }}'
      DIST: '{{ .DIST | default "" }}'
  build-beta:
    desc: Build algolia-beta (same .env ldflags as build; use beside a prod algolia install)
    cmds:
      - task: build
        vars:
          OUTPUT: algolia-beta
          VERSION: '{{ .VERSION | default "main+beta" }}'
          DIST: beta
  test:
    desc: Run unit tests
    run: always
    cmd: go test ./...
  e2e:
    desc: Run end-to-end tests
    summary: |
      Run tests that mimic how user enters commands and flags.
      These tests make real requests to the Algolia API.
      To run them, create a `.env` file with the `ALGOLIA_APPLICATION_ID`
      and `ALGOLIA_API_KEY` credentials.
    cmd: go test ./e2e -tags=e2e
  lint:
    desc: Lint code
    cmd: golangci-lint run
  format:
    desc: Format code
    cmds:
      - gofumpt -w pkg cmd test internal api e2e
      - golines -w pkg cmd test internal api e2e
  ci:
    desc: Test, lint, and format
    aliases:
      - default
    deps:
      - build
      - test
      - lint
      - format
  api-specs-pr:
    desc: Update the flags for search and settings from the latest Search API spec
    summary: |
      This task downloads the latest Search API OpenAPI spec from the api-clients-automation repo,
      generates the flags, and makes a new PR to the CLI GitHub repo.
    deps: [download-spec-file, generate]
    preconditions:
      - git status --porcelain
    cmds:
      - |
        original="$(git branch --show-current)"
        git checkout -B {{ .branch }}
        git add .
        git commit --message "chore: update search api spec"
        git push --force --set-upstream origin {{ .branch }}
        gh pr list --base main --head {{ .branch }} | grep -q . || gh pr create --title '{{ .pr-title }}' --description '{{ .pr-description }}'
        git switch "${original}"
    vars:
      branch: feat/api-specs
      pr-title: "chore: Update Search API spec"
      pr-description: "Update Search API spec"
    env:
      GIT_COMMITTER_NAME: algolia-ci
      GIT_AUTHOR_NAME: algolia-ci
      GIT_COMMITTER_EMAIL: noreply@algolia.com
      GIT_AUTHOR_EMAIL: noreply@algolia.com
  download-spec-file:
    desc: Download the latest Search API spec from GitHub
    cmd: curl -fsSL -o {{ .destination }} {{ .source }}
    vars:
      source: https://raw.githubusercontent.com/algolia/api-clients-automation/main/specs/bundled/search.yml
      destination: ./api/specs/search.yml
  generate:
    desc: Generate command flags
    internal: true
    cmds:
      - go generate ./...
  update-docs:
    desc: Update the CLI command reference in the Algolia docs
    deps:
      - clone-docs
      - generate-command-reference
    cmds:
      - task: update-command-reference
      - task: cleanup
  clone-docs:
    desc: Clone the Algolia docs
    internal: true
    cmd: git clone --depth=1 {{ .docs_remote }} {{ .docs_local }}
  generate-command-reference:
    desc: Generate updated MDX files for the CLI command reference
    internal: true
    cmd: go run ./cmd/docs --app_data-path {{ .docs_output_dir }}
  update-command-reference:
    desc: Add the updated MDX files to the docs
    summary: |
      This task clones the Algolia docs repo,
      adds the updated CLI reference mdx files to it,
      and pushes a new PR to the GitHub repo.
    internal: true
    cmds:
      - |
        git -C {{ .docs_local }} checkout -B chore/cli-$(git rev-parse --short HEAD)
        rm -rf {{ .docs_local }}/{{ .cli_ref_path }}
        mkdir -p {{ .docs_local }}/{{ .cli_ref_path }}
        mv {{ .docs_output_dir }}/* {{ .docs_local }}/{{ .cli_ref_path }}/
        git -C {{ .docs_local }} add -A {{ .cli_ref_path }}
        git -C {{ .docs_local }} commit --message 'chore: Update CLI command reference'
    env:
      GIT_COMMITTER_NAME: algolia-ci
      GIT_AUTHOR_NAME: algolia-ci
      GIT_COMMITTER_EMAIL: noreply@algolia.com
      GIT_AUTHOR_EMAIL: noreply@algolia.com
  cleanup:
    desc: Cleanup the docs files
    internal: true
    cmd: rm -rf {{ .docs_local }} {{ .docs_output_dir }} || true
