linters:
  enable:
    - gosec
    - gofumpt
    - stylecheck

issues:
  exclude-rules:
    # The dashboard client surfaces user-facing CLI errors that are intentionally
    # written as capitalized, human-readable sentences (e.g. "Couldn't get the
    # list of plans: 404"), so the ST1005 "error strings should not be
    # capitalized" check is disabled for this file only.
    - path: api/dashboard/client.go
      linters:
        - stylecheck
      text: ST1005
    # secret.go defines the keychain service name and the secret-kind
    # identifiers (e.g. "api_key", "crawler_api_key") used as keychain account
    # suffixes. These are field names, not embedded credentials, so gosec's
    # G101 hardcoded-credential heuristic is a false positive here.
    - path: pkg/config/state/secret.go
      linters:
        - gosec
      text: G101
